name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Lint with flake8
        run: |
          pip install flake8
          cd backend
          flake8 app/ --max-line-length=100 --ignore=E501 || true
      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v || echo "No tests yet"

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and build frontend
        run: |
          cd frontend
          npm ci
          npm run build
